# GitLab CI Template: Trunk-Based Development with Branch for Release
# Philosophy: main -> Staging (Auto), tags -> Production (Manual/Auto)

stages:
  - build
  - test
  - deploy-staging
  - deploy-prod

# -----------------------------------------------------------------------------
# Base SSH Configuration Template (Generic)
# -----------------------------------------------------------------------------
.base_ssh_setup: &base_ssh_setup
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client git
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | base64 -d | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H "$TARGET_HOST" >> ~/.ssh/known_hosts

# -----------------------------------------------------------------------------
# Generic Deployment Script Template
# -----------------------------------------------------------------------------
.deploy_script_template: &deploy_script_template
  script:
    - echo "🚀 Deploying to $TARGET_HOST ($ENVIRONMENT_NAME)..."
    - |
      ssh $TARGET_USER@$TARGET_HOST "
        if [ ! -d $PROJECT_ROOT ]; then
          mkdir -p $PROJECT_ROOT
          git clone $REPO_URL $PROJECT_ROOT
        fi
        cd $PROJECT_ROOT
        git fetch --all --prune
        git checkout $CI_COMMIT_BRANCH || git checkout -b $CI_COMMIT_BRANCH origin/$CI_COMMIT_BRANCH
        git merge --ff-only origin/$CI_COMMIT_BRANCH
        git checkout --detach $CI_COMMIT_SHA
        # Add your custom build/restart commands here
        # docker-compose up -d --build
      "
    - echo "✅ Deployment to $ENVIRONMENT_NAME complete!"

# -----------------------------------------------------------------------------
# JOBS: STAGING (Automatic on 'main' branch)
# -----------------------------------------------------------------------------
deploy_staging:
  <<: *base_ssh_setup
  <<: *deploy_script_template
  stage: deploy-staging
  variables:
    ENVIRONMENT_NAME: "Staging"
    TARGET_HOST: $STAGING_HOST
    TARGET_USER: $STAGING_USER
    PROJECT_ROOT: $STAGING_PROJECT_ROOT
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# -----------------------------------------------------------------------------
# JOBS: PRODUCTION (Triggered by Tags 'v*')
# -----------------------------------------------------------------------------
deploy_production:
  <<: *base_ssh_setup
  <<: *deploy_script_template
  stage: deploy-prod
  when: manual  # Safety guard: Manual approval for Prod
  variables:
    ENVIRONMENT_NAME: "Production"
    TARGET_HOST: $PROD_HOST
    TARGET_USER: $PROD_USER
    PROJECT_ROOT: $PROD_PROJECT_ROOT
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
